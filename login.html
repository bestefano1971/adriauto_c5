<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Futsal Performance Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body style="background: var(--bg-dark); min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;">
    <div class="background-decorations">
        <div class="glow-sphere glow-1"></div>
        <div class="glow-sphere glow-2"></div>
        <div class="glow-sphere glow-3"></div>
    </div>
    
    <div class="login-box" style="z-index: 10; position: relative;">
        <h2>Futsal Performance Portal</h2>
        <form id="login-form">
            <select id="login-user" required style="width: 100%; margin-bottom: 1.5rem; padding: 0.8rem 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1rem;">
                <option value="" disabled selected>Seleziona Utente</option>
            </select>
            <input type="password" id="login-pass" placeholder="Password" required autocomplete="current-password" style="margin-bottom: 0.5rem; width: 100%; padding: 0.8rem 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1rem;">
            <div style="text-align: left; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="show-login-pass" onchange="document.getElementById('login-pass').type = this.checked ? 'text' : 'password'" style="width: auto; margin: 0;">
                <label for="show-login-pass" style="cursor: pointer;">Mostra Password</label>
            </div>
            <button type="submit">Accedi</button>
            <p class="login-error" id="login-error-msg" style="display: none;">Credenziali non valide.</p>
        </form>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
